name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install Linux aarch64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu' && !matrix.use_cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: '!matrix.use_cross'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        shell: bash
        run: |
          BINARY=claude-usage-tui
          TARGET=${{ matrix.target }}
          TARBALL="${BINARY}-${TARGET}.tar.gz"
          cp "target/${TARGET}/release/${BINARY}" "${BINARY}"
          tar czf "${TARBALL}" "${BINARY}"
          echo "TARBALL=${TARBALL}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.TARBALL }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect tarballs
        run: |
          mkdir release-assets
          find artifacts -name '*.tar.gz' -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    if: "!contains(github.ref_name, '-')"
    steps:
      - name: Compute SHA256 and update formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE="https://github.com/yuhanwang14/Claude-Usage-TUI/releases/download/${GITHUB_REF_NAME}"

          # Download and hash macOS binaries
          curl -sL "${BASE}/claude-usage-tui-aarch64-apple-darwin.tar.gz" -o arm64.tar.gz
          curl -sL "${BASE}/claude-usage-tui-x86_64-apple-darwin.tar.gz" -o x64.tar.gz
          ARM_SHA=$(sha256sum arm64.tar.gz | awk '{print $1}')
          X64_SHA=$(sha256sum x64.tar.gz | awk '{print $1}')

          echo "arm64 SHA256: $ARM_SHA"
          echo "x86_64 SHA256: $X64_SHA"

          # Generate formula
          FORMULA=$(cat <<RUBY
          class ClaudeUsageTui < Formula
            desc "btop-style terminal UI for monitoring Claude.ai usage limits in real-time"
            homepage "https://github.com/yuhanwang14/Claude-Usage-TUI"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/yuhanwang14/Claude-Usage-TUI/releases/latest/download/claude-usage-tui-aarch64-apple-darwin.tar.gz"
                sha256 "${ARM_SHA}"
              end

              on_intel do
                url "https://github.com/yuhanwang14/Claude-Usage-TUI/releases/latest/download/claude-usage-tui-x86_64-apple-darwin.tar.gz"
                sha256 "${X64_SHA}"
              end
            end

            def install
              bin.install "claude-usage-tui"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/claude-usage-tui --version 2>&1", 0)
            end
          end
          RUBY
          )

          # Update formula in homebrew-tap repo via GitHub API
          FILE_SHA=$(gh api repos/yuhanwang14/homebrew-tap/contents/Formula/claude-usage-tui.rb --jq '.sha')
          echo "$FORMULA" | gh api repos/yuhanwang14/homebrew-tap/contents/Formula/claude-usage-tui.rb \
            --method PUT \
            -f message="Update to v${VERSION}" \
            -f content="$(echo "$FORMULA" | base64 -w0)" \
            -f sha="$FILE_SHA"
